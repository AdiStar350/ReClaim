# ═══════════════════════════════════════════════════════════════════════
#  ReClaim Backend — Application Properties
# ═══════════════════════════════════════════════════════════════════════

# Load credentials from the project-root .env file when present.
spring.config.import=optional:file:../.env[.properties]

# ── Server ────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── MongoDB Atlas (required) ──────────────────────────────────────────
# Set MONGODB_USER, MONGODB_PASSWORD, MONGODB_HOST in ../.env
# (or provide a full MONGODB_URI override). See MongoConfig.java.
spring.data.mongodb.database=${MONGODB_DATABASE:reclaim}

# ── JWT Configuration ─────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:ReClaim-Super-Secret-JWT-Key-2026-Must-Be-At-Least-256-Bits-Long!!}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# ── Firebase (optional — configure when Firebase Storage is ready) ────
# firebase.config.path=src/main/resources/firebase-service-account.json
# firebase.storage.bucket=your-project-id.appspot.com

# ── Logging ───────────────────────────────────────────────────────────
logging.level.com.example.reclaimbackend=INFO
logging.level.org.springframework.security=INFO
